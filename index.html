<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orphe Recorder v0.2 — 接続テスト</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 16px; line-height: 1.6; }
  h1 { font-size: 1.2rem; margin: 0 0 4px; }
  .sub { color: #888; font-size: .85rem; margin: 0 0 12px; }
  #diag { font-family: ui-monospace, monospace; font-size: .8rem; white-space: pre;
          background: rgba(128,128,128,.12); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; }
  button { font-size: 1.1rem; padding: 14px 20px; border-radius: 12px; border: none;
           background: #2563eb; color: #fff; width: 100%; margin-bottom: 12px; }
  button:disabled { background: #9ca3af; }
  #status { padding: 10px 12px; border-radius: 10px; background: rgba(128,128,128,.15);
            font-size: .95rem; margin-bottom: 12px; }
  #log { font-family: ui-monospace, monospace; font-size: .75rem; white-space: pre-wrap;
         color: #dc2626; min-height: 1.2em; margin-bottom: 12px; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .card { background: rgba(128,128,128,.12); border-radius: 12px; padding: 12px; }
  .card .label { font-size: .75rem; color: #888; }
  .card .val { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .val.warn { color: #dc2626; }
  canvas { width: 100%; height: 150px; background: rgba(128,128,128,.10); border-radius: 12px; }
</style>
</head>
<body>
  <h1>Orphe Recorder v0.2</h1>
  <p class="sub">接続テスト版。まず下の診断4行を確認 → 「接続」。</p>

  <div id="diag">診断中…</div>

  <button id="connect">シューズを接続</button>
  <div id="status">未接続</div>
  <div id="log"></div>

  <div class="metrics">
    <div class="card"><div class="label">gyro_x (°/s)</div><div class="val" id="gx">–</div></div>
    <div class="card"><div class="label">サンプルレート</div><div class="val" id="rate">– <span style="font-size:.9rem">Hz</span></div></div>
    <div class="card"><div class="label">受信サンプル数</div><div class="val" id="count">0</div></div>
    <div class="card"><div class="label">欠損イベント</div><div class="val" id="lost">0</div></div>
  </div>
  <canvas id="wave" width="720" height="300"></canvas>

  <!-- ライブラリ（同梱・CDN依存なし） -->
  <script src="js/ORPHE-CORE.js"></script>
  <script src="js/float16.min.js"></script>
  <script src="js/quaternion.js"></script>

  <!-- ① 診断だけ（ES5・古いChromeでも必ず動く。ここは絶対落とさない） -->
  <script>
    (function () {
      function el(id){ return document.getElementById(id); }
      window.__logLine = function (m) { var d = el('log'); if (d) d.textContent += m + '\n'; };
      window.addEventListener('error', function (e) { if (window.__logLine) window.__logLine('ERR: ' + e.message); });
      var ua = navigator.userAgent;
      var m = ua.match(/Chrome\/(\d+)/);
      var cv = m ? m[1] : '不明';
      var L = [];
      L.push('Chrome バージョン : ' + cv + (m && parseInt(cv,10) < 80 ? '  ← 古すぎ(80未満)' : ''));
      L.push('セキュア(HTTPS)   : ' + (window.isSecureContext ? 'OK' : 'NG'));
      L.push('Web Bluetooth     : ' + (navigator.bluetooth ? '対応' : '非対応 ✗'));
      L.push('ライブラリ Orphe   : ' + (typeof Orphe !== 'undefined' ? 'ロード済' : '未ロード ✗'));
      el('diag').textContent = L.join('\n');
    })();
  </script>

  <!-- ② 本体（新しめの文法を使う。古Chromeでここが落ちても①の診断は残る） -->
  <script>
    let core = null, count = 0, lost = 0, lastGx = 0;
    let rateWindow = [];
    const buf = [], BUF_MAX = 720;
    function setStatus(m){ document.getElementById('status').textContent = m; }

    window.onload = function () {
      try {
        if (typeof Orphe === 'undefined') { window.__logLine('Orphe未定義：ライブラリが読めていない'); setStatus('ライブラリ読込失敗（上の診断参照）'); return; }
        core = new Orphe(0);
        core.setup();
        core.gotGyro = function (gyro) {
          const t = performance.now();
          count++; lastGx = gyro.x;
          rateWindow.push(t);
          while (rateWindow.length && rateWindow[0] < t - 1000) rateWindow.shift();
          buf.push(gyro.x); if (buf.length > BUF_MAX) buf.shift();
        };
        core.lostData = function () { lost++; };
        requestAnimationFrame(render);
      } catch (err) {
        window.__logLine('init失敗: ' + (err && err.message ? err.message : err));
        setStatus('初期化失敗（上のログ参照）');
      }
    };

    document.getElementById('connect').onclick = async function () {
      const btn = this;
      if (!navigator.bluetooth) { setStatus('この端末/ブラウザは Web Bluetooth 非対応'); return; }
      if (!core) { setStatus('ライブラリ未初期化（診断/ログ参照）'); return; }
      btn.disabled = true;
      setStatus('接続中… ダイアログでシューズを選んでください');
      try {
        await core.begin('SENSOR_VALUES');
        setStatus('接続済み ✓ データ受信中');
      } catch (e) {
        const msg = (e && e.message) ? e.message : String(e);
        setStatus('接続失敗: ' + msg);
        window.__logLine('begin失敗: ' + msg);
        btn.disabled = false;
      }
    };

    const ctx = document.getElementById('wave').getContext('2d');
    function render() {
      document.getElementById('gx').textContent = lastGx.toFixed(1);
      document.getElementById('count').textContent = count;
      const rate = rateWindow.length;
      const rEl = document.getElementById('rate');
      rEl.innerHTML = rate + ' <span style="font-size:.9rem">Hz</span>';
      rEl.className = 'val' + (count > 0 && rate < 150 ? ' warn' : '');
      const lEl = document.getElementById('lost');
      lEl.textContent = lost; lEl.className = 'val' + (lost > 0 ? ' warn' : '');
      const w = ctx.canvas.width, h = ctx.canvas.height;
      ctx.clearRect(0, 0, w, h);
      if (buf.length > 1) {
        let mx = 1; for (const v of buf) mx = Math.max(mx, Math.abs(v));
        ctx.strokeStyle = 'rgba(128,128,128,.4)';
        ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
        ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2; ctx.beginPath();
        for (let i = 0; i < buf.length; i++) {
          const x = (i / (BUF_MAX - 1)) * w;
          const y = h/2 - (buf[i] / mx) * (h/2 - 8);
          i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
        }
        ctx.stroke();
      }
      requestAnimationFrame(render);
    }
  </script>
</body>
</html>
