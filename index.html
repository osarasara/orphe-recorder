<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orphe Recorder v0.3 — 走行データ収録（両足）</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 16px; line-height: 1.6; }
  h1 { font-size: 1.2rem; margin: 0 0 4px; }
  .sub { color: #888; font-size: .85rem; margin: 0 0 12px; }
  #diag { font-family: ui-monospace, monospace; font-size: .8rem; white-space: pre;
          background: rgba(128,128,128,.12); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; }
  button { font-size: 1.05rem; padding: 13px 18px; border-radius: 12px; border: none;
           background: #2563eb; color: #fff; width: 100%; margin-bottom: 8px; }
  button:disabled { background: #9ca3af; }
  button.rec { background: #16a34a; }
  button.stop { background: #dc2626; }
  button.ghost { background: rgba(128,128,128,.2); color: inherit; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  label.lbl { font-size: .8rem; color: #888; display:block; margin: 4px 0 2px; }
  input[type=text] { width: 100%; box-sizing: border-box; font-size: 1rem; padding: 10px 12px;
           border-radius: 10px; border: 1px solid rgba(128,128,128,.4); background: transparent; color: inherit; margin-bottom: 10px; }
  .foot { border: 1px solid rgba(128,128,128,.25); border-radius: 12px; padding: 10px; }
  .foot h2 { font-size: .95rem; margin: 0 0 6px; }
  .foot .st { font-size: .8rem; color:#888; margin-bottom: 8px; min-height: 1.2em; }
  .foot.on { border-color: #16a34a; }
  .m { display:flex; justify-content:space-between; font-variant-numeric: tabular-nums; font-size:.85rem; }
  .m b { font-weight:700; }
  .warn { color:#dc2626; }
  #recbar { margin: 14px 0 6px; }
  #elapsed { text-align:center; font-size:1.6rem; font-weight:700; font-variant-numeric: tabular-nums; margin: 6px 0; }
  #downloads { margin-top: 12px; }
  #downloads a { display:block; text-align:center; text-decoration:none; }
  #summary { font-family: ui-monospace, monospace; font-size:.78rem; white-space:pre-wrap;
             background: rgba(128,128,128,.12); border-radius:10px; padding:10px 12px; margin-top:10px; }
  #log { font-family: ui-monospace, monospace; font-size: .75rem; white-space: pre-wrap;
         color: #dc2626; min-height: 1.2em; margin-top: 10px; }
</style>
</head>
<body>
  <h1>Orphe Recorder v0.3</h1>
  <p class="sub">走行データ収録（両足L/R・ビープ同期・CSV保存）。まず診断4行を確認 → 左右を接続 → 収録。</p>

  <div id="diag">診断中…</div>

  <label class="lbl">ファイル名ラベル（例: run1）</label>
  <input type="text" id="label" value="run" autocomplete="off">

  <div class="row2">
    <div class="foot" id="footL">
      <h2>左足 (L)</h2>
      <div class="st" id="stL">未接続</div>
      <button id="connL">接続 左足</button>
      <div class="m"><span>レート</span><b id="hzL">– Hz</b></div>
      <div class="m"><span>サンプル</span><b id="nL">0</b></div>
      <div class="m"><span>欠損</span><b id="lostL">0</b></div>
    </div>
    <div class="foot" id="footR">
      <h2>右足 (R)</h2>
      <div class="st" id="stR">未接続</div>
      <button id="connR">接続 右足</button>
      <div class="m"><span>レート</span><b id="hzR">– Hz</b></div>
      <div class="m"><span>サンプル</span><b id="nR">0</b></div>
      <div class="m"><span>欠損</span><b id="lostR">0</b></div>
    </div>
  </div>

  <div id="recbar">
    <button id="rec" class="rec" disabled>● 収録開始</button>
    <button id="stop" class="stop" disabled style="display:none">■ 収録停止</button>
  </div>
  <div id="elapsed"></div>

  <div id="downloads"></div>
  <pre id="summary" style="display:none"></pre>
  <div id="log"></div>

  <!-- ライブラリ（同梱・CDN依存なし） -->
  <script src="js/ORPHE-CORE.js"></script>
  <script src="js/float16.min.js"></script>
  <script src="js/quaternion.js"></script>

  <!-- ① 診断だけ（ES5・古いChromeでも必ず動く。ここは絶対落とさない） -->
  <script>
    (function () {
      function el(id){ return document.getElementById(id); }
      window.__logLine = function (m) { var d = el('log'); if (d) d.textContent += m + '\n'; };
      window.addEventListener('error', function (e) { if (window.__logLine) window.__logLine('ERR: ' + e.message); });
      var ua = navigator.userAgent, m = ua.match(/Chrome\/(\d+)/), cv = m ? m[1] : '不明';
      var L = [];
      L.push('Chrome バージョン : ' + cv + (m && parseInt(cv,10) < 80 ? '  ← 古すぎ(80未満)' : ''));
      L.push('セキュア(HTTPS)   : ' + (window.isSecureContext ? 'OK' : 'NG'));
      L.push('Web Bluetooth     : ' + (navigator.bluetooth ? '対応' : '非対応 ✗'));
      L.push('ライブラリ Orphe   : ' + (typeof Orphe !== 'undefined' ? 'ロード済' : '未ロード ✗'));
      el('diag').textContent = L.join('\n');
    })();
  </script>

  <!-- ② 本体 -->
  <script>
    const CSV_HEADER = 'timestamp,acc_x,acc_y,acc_z,gyro_x,gyro_y,gyro_z,quat_x,quat_y,quat_z,quat_w';
    // 既存データと同じスケールで残す: acc/gyro=正規化値(解析側で ×16 / ×2000)、quat=生int16、timestamp=デバイス時刻(PC時計に同期)
    const feet = {
      L: { key:'L', id:0, core:null, connected:false, rec:[], n:0, lost:0, rateWin:[], lastTs:0 },
      R: { key:'R', id:1, core:null, connected:false, rec:[], n:0, lost:0, rateWin:[], lastTs:0 },
    };
    let recording = false, recStart = 0, recEnd = 0, wakeLock = null, audioCtx = null;
    const startBeepTs = {}, endBeepTs = {};
    const $ = id => document.getElementById(id);

    // ---- サンプル受信（gotGyro時点で core.acc / core.quat も同一サンプル値） ----
    function onSample(F) {
      const c = F.core, ts = (c.gyro && c.gyro.timestamp) ? c.gyro.timestamp : Date.now();
      F.n++; F.lastTs = ts;
      const now = performance.now();
      F.rateWin.push(now);
      while (F.rateWin.length && F.rateWin[0] < now - 1000) F.rateWin.shift();
      if (recording) {
        const a = c.acc, g = c.gyro, q = c.quat;
        F.rec.push(
          ts + ',' +
          a.x + ',' + a.y + ',' + a.z + ',' +
          g.x + ',' + g.y + ',' + g.z + ',' +
          Math.round(q.x*32768) + ',' + Math.round(q.y*32768) + ',' + Math.round(q.z*32768) + ',' + Math.round(q.w*32768)
        );
      }
    }

    async function connect(F, btn, stEl) {
      if (!navigator.bluetooth) { stEl.textContent = 'Web Bluetooth 非対応'; return; }
      if (typeof Orphe === 'undefined') { stEl.textContent = 'ライブラリ未ロード'; return; }
      ensureAudio();
      btn.disabled = true; stEl.textContent = '接続中… ダイアログでシューズを選択';
      try {
        F.core = new Orphe(F.id);
        F.core.setup();
        F.core.gotGyro = function () { onSample(F); };
        F.core.lostData = function () { F.lost++; };
        // range: 既存解析に合わせ acc=16g / gyro=2000dps。useSharedBridgeは2台同時のため無効化
        await F.core.begin('SENSOR_VALUES', { range: { acc: 16, gyro: 2000 }, useSharedBridge: false });
        F.connected = true;
        stEl.textContent = '接続済み ✓ 受信中';
        $('foot'+F.key).classList.add('on');
        btn.textContent = '再接続 ' + (F.key==='L'?'左足':'右足');
        btn.disabled = false;
        updateRecEnabled();
      } catch (e) {
        const msg = (e && e.message) ? e.message : String(e);
        stEl.textContent = '接続失敗: ' + msg;
        window.__logLine('begin失敗('+F.key+'): ' + msg);
        btn.disabled = false;
      }
    }
    $('connL').onclick = function(){ connect(feet.L, this, $('stL')); };
    $('connR').onclick = function(){ connect(feet.R, this, $('stR')); };

    function updateRecEnabled() {
      $('rec').disabled = recording || !(feet.L.connected || feet.R.connected);
    }

    // ---- ビープ（Web Audio）----
    function ensureAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) { window.__logLine('audio初期化失敗: ' + e.message); }
    }
    function beep(freq, ms) {
      if (!audioCtx) return;
      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.type = 'square'; osc.frequency.value = freq || 1320;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.6, t0 + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + (ms||130)/1000);
      osc.connect(g).connect(audioCtx.destination);
      osc.start(t0); osc.stop(t0 + (ms||130)/1000 + 0.02);
    }

    // ---- Wake Lock ----
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
        else window.__logLine('Wake Lock非対応: 画面が消えると収録が止まる可能性→画面ONを保って');
      } catch (e) { window.__logLine('WakeLock失敗: ' + e.message); }
    }
    function releaseWakeLock() { try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch(e){} }
    document.addEventListener('visibilitychange', function(){
      if (recording && document.visibilityState === 'visible' && !wakeLock) requestWakeLock();
    });

    // ---- 収録 開始 / 停止 ----
    let elapsedTimer = null;
    $('rec').onclick = async function () {
      ensureAudio();
      feet.L.rec = []; feet.R.rec = [];
      recording = true; recStart = Date.now();
      startBeepTs.L = feet.L.lastTs || recStart; startBeepTs.R = feet.R.lastTs || recStart;
      beep(1320, 130);
      await requestWakeLock();
      $('rec').style.display = 'none'; $('stop').style.display = ''; $('stop').disabled = false;
      $('downloads').innerHTML = ''; $('summary').style.display = 'none';
      elapsedTimer = setInterval(function(){
        const s = (Date.now() - recStart)/1000;
        $('elapsed').textContent = '● REC  ' + s.toFixed(1) + ' s';
      }, 100);
      updateRecEnabled();
    };

    $('stop').onclick = function () {
      recording = false; recEnd = Date.now();
      endBeepTs.L = feet.L.lastTs || recEnd; endBeepTs.R = feet.R.lastTs || recEnd;
      beep(880, 200);
      releaseWakeLock();
      clearInterval(elapsedTimer);
      $('elapsed').textContent = '';
      $('stop').style.display = 'none'; $('rec').style.display = ''; updateRecEnabled();
      buildDownloads();
    };

    // ---- CSV / メタ 生成 → ダウンロードボタン（モバイルは手動タップが確実） ----
    function stamp(d) {
      const p = n => String(n).padStart(2,'0');
      return d.getFullYear() + p(d.getMonth()+1) + p(d.getDate()) + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
    }
    function mkLink(name, text, blob) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = name;
      const b = document.createElement('button'); b.className = 'ghost'; b.textContent = text;
      a.appendChild(b); return a;
    }
    function buildDownloads() {
      const label = ($('label').value || 'run').replace(/[^\w\-]/g,'_');
      const st = stamp(new Date(recStart));
      const durS = (recEnd - recStart)/1000;
      const dl = $('downloads'); dl.innerHTML = '';
      const info = [];
      ['L','R'].forEach(function(k){
        const F = feet[k], side = k==='L' ? 'left' : 'right';
        if (!F.connected && F.rec.length === 0) return;
        const csv = CSV_HEADER + '\n' + F.rec.join('\n') + '\n';
        const fname = label + '_' + st + '_' + side + '_sensor.csv';
        dl.appendChild(mkLink(fname, '⬇ ' + (k==='L'?'左足':'右足') + ' CSV (' + F.rec.length + '行)', new Blob([csv], {type:'text/csv'})));
        const hz = F.rec.length && durS>0 ? (F.rec.length/durS) : 0;
        info.push(k + ': ' + F.rec.length + '行  ' + hz.toFixed(0) + 'Hz  欠損' + F.lost +
                  (F.rec.length && (hz<150||F.lost>durS*3) ? '  ⚠要確認' : '  OK'));
      });
      const meta = {
        label: label, stamp: st,
        start_beep_epoch_ms: recStart, end_beep_epoch_ms: recEnd, duration_s: durS,
        range: { acc: 16, gyro: 2000 },
        note: 'timestamp=デバイス時刻(PC時計に同期,epoch ms)。start/end_beep_epoch_msはCSV timestampと同じ時計＝動画の同期用。acc/gyroは正規化値(解析側で ×16 / ×2000)、quatは生int16(÷32768で正規化)。',
        feet: {
          left:  { connected: feet.L.connected, samples: feet.L.rec.length, lost: feet.L.lost, start_beep_sensor_ts: startBeepTs.L, end_beep_sensor_ts: endBeepTs.L },
          right: { connected: feet.R.connected, samples: feet.R.rec.length, lost: feet.R.lost, start_beep_sensor_ts: startBeepTs.R, end_beep_sensor_ts: endBeepTs.R },
        }
      };
      dl.appendChild(mkLink(label + '_' + st + '_meta.json', '⬇ meta.json（同期・品質）', new Blob([JSON.stringify(meta,null,2)], {type:'application/json'})));
      const sm = $('summary'); sm.style.display = '';
      sm.textContent = '収録 ' + durS.toFixed(1) + 's  (' + label + '_' + st + ')\n' + info.join('\n') +
                       '\n\n※上のボタンを1つずつタップして保存。\n※CSVは既存の *_sensor.csv と同形式。実験フォルダに置けば compare_all.py / ble_quality_check.py がそのまま読めます。';
    }

    // ---- ライブ表示 ----
    function render() {
      ['L','R'].forEach(function(k){
        const F = feet[k], hz = F.rateWin.length;
        const hzEl = $('hz'+k); hzEl.textContent = (F.connected ? hz : '–') + ' Hz';
        hzEl.className = (F.connected && F.n>0 && hz<150) ? 'warn' : '';
        $('n'+k).textContent = recording ? F.rec.length : F.n;
        const lEl = $('lost'+k); lEl.textContent = F.lost; lEl.className = F.lost>0 ? 'warn' : '';
      });
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
  </script>
</body>
</html>
